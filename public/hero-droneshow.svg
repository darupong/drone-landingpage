<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="LuminaSky drone light show in the night sky">
  <defs>
    <radialGradient id="sky" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0f33"/>
      <stop offset="60%" stop-color="#0a0613"/>
      <stop offset="100%" stop-color="#040208"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#c084fc" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f33" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070310" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#sky)"/>

  <!-- Distant stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="60" cy="80" r="0.8"/>
    <circle cx="120" cy="160" r="1.1"/>
    <circle cx="200" cy="50" r="0.7"/>
    <circle cx="280" cy="120" r="0.9"/>
    <circle cx="360" cy="60" r="0.6"/>
    <circle cx="440" cy="140" r="1.0"/>
    <circle cx="520" cy="80" r="0.7"/>
    <circle cx="600" cy="170" r="1.2"/>
    <circle cx="680" cy="40" r="0.8"/>
    <circle cx="740" cy="120" r="0.9"/>
    <circle cx="90" cy="240" r="0.7"/>
    <circle cx="180" cy="300" r="1.0"/>
    <circle cx="640" cy="260" r="0.9"/>
    <circle cx="720" cy="320" r="0.8"/>
    <circle cx="80" cy="380" r="0.6"/>
    <circle cx="40" cy="440" r="1.0"/>
    <circle cx="760" cy="480" r="0.9"/>
  </g>

  <!-- Heart formation made of glowing drone points -->
  <g transform="translate(400 410)">
    <!-- Heart outline drone formation. Each "drone" is a small circle with glow. -->
    <g>
      <!-- Left lobe -->
      <g transform="translate(-130 -120)">
        <circle r="22" fill="url(#glow-amber)"/>
        <circle r="3.5" fill="#fde68a"/>
      </g>
      <g transform="translate(-185 -140)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(-230 -100)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(-250 -40)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(-240 25)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(-200 80)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(-140 140)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(-70 195)"><circle r="20" fill="url(#glow-amber)"/><circle r="3.2" fill="#fde68a"/></g>
      <!-- Bottom point -->
      <g transform="translate(0 230)"><circle r="22" fill="url(#glow-amber)"/><circle r="3.5" fill="#fff7ed"/></g>
      <!-- Right lobe -->
      <g transform="translate(70 195)"><circle r="20" fill="url(#glow-amber)"/><circle r="3.2" fill="#fde68a"/></g>
      <g transform="translate(140 140)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(200 80)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(240 25)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(250 -40)"><circle r="18" fill="url(#glow-violet)"/><circle r="3" fill="#e9d5ff"/></g>
      <g transform="translate(230 -100)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(185 -140)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(130 -120)"><circle r="22" fill="url(#glow-amber)"/><circle r="3.5" fill="#fde68a"/></g>
      <g transform="translate(70 -90)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(-70 -90)"><circle r="18" fill="url(#glow-amber)"/><circle r="3" fill="#fde68a"/></g>
      <g transform="translate(0 -65)"><circle r="16" fill="url(#glow-amber)"/><circle r="2.6" fill="#fde68a"/></g>

      <!-- Inner pattern (filler dots) -->
      <g fill="#fde68a" opacity="0.85">
        <circle cx="-90" cy="-60" r="2"/>
        <circle cx="-150" cy="-40" r="2"/>
        <circle cx="-170" cy="20" r="2"/>
        <circle cx="-130" cy="70" r="2"/>
        <circle cx="-60" cy="130" r="2"/>
        <circle cx="0" cy="170" r="2"/>
        <circle cx="60" cy="130" r="2"/>
        <circle cx="130" cy="70" r="2"/>
        <circle cx="170" cy="20" r="2"/>
        <circle cx="150" cy="-40" r="2"/>
        <circle cx="90" cy="-60" r="2"/>
        <circle cx="-30" cy="-30" r="2"/>
        <circle cx="30" cy="-30" r="2"/>
        <circle cx="0" cy="40" r="2"/>
        <circle cx="-60" cy="60" r="2"/>
        <circle cx="60" cy="60" r="2"/>
      </g>
    </g>
  </g>

  <!-- City skyline silhouette -->
  <g fill="#0a0613">
    <rect x="0" y="690" width="800" height="110"/>
    <polygon points="40,690 60,690 60,640 90,640 90,690 130,690 130,610 160,610 160,690 200,690 200,650 240,650 240,690 280,690 280,580 320,580 320,690 360,690 360,620 400,620 400,690 440,690 440,600 480,600 480,690 520,690 520,640 560,640 560,690 600,690 600,610 640,610 640,690 680,690 680,650 720,650 720,690 760,690 760,640 790,640 790,690"/>
  </g>
  <rect x="0" y="640" width="800" height="60" fill="url(#horizon)"/>
</svg>
